experiment_name: mjo
seed: 42

paths:
  latent_base: latent_output
  figure_dir: outputs/figures/MJO_figures
  metrics_dir: outputs/metrics/MJO_metrics

data:
  years: [1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020]
  months: [5, 6, 7, 8]

target:
  type: mjo
  path: climate_indices_data/mjo.txt
  prithvi_start: "1980-01-01"
  prithvi_end: "2021-12-31"
  columns: [rmm1, rmm2]
  plot_names: [RMM1, RMM2]

sequence:
  seq_len: 14

models:
  lstm:
    hidden_dim: 128
    num_layers: 2
    dropout_rate: 0.1
  transformer:
    d_model: 128
    nhead: 4
    num_layers: 2
    dropout_rate: 0.05
  joint:
    compressor:
      bottleneck_dim: 50
      hidden_dims: [256, 128]
      dropout_rate: 0.05

training:
  lstm:
    batch_size: 30
    epochs: 25
    lr: 1.0e-4
    weight_decay: 0.0
  transformer:
    batch_size: 30
    epochs: 25
    lr: 1.0e-4
    weight_decay: 1.0e-4
  joint:
    batch_size: 30
    epochs: 30
    lr: 1.0e-3
    weight_decay: 1.0e-4
